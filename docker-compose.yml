services:
  app:
    image: ${DOCKER_IMAGE:-hookfy:local}
    build: .
    restart: unless-stopped
    expose:
      - "${PORT}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file: .env
    environment:
      PORT: ${PORT}
      DB_PATH: ${DB_PATH}
    volumes:
      - sqlite:/app/db/

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      APP_PORT: ${PORT}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  sqlite:
